<!--
 * Extension Detection Page
 * ------------------------
 * This plain HTML file is used for detecting if the Acrobat extension is
 * installed and active. Web pages (e.g., WhatsApp integration) can fetch this URL via chrome-extension://<id>/extension-detection.html.
 * A successful fetch indicates the extension is installed; a failed fetch
 * indicates it is not.
 *
 * Currently used by: WhatsApp integration
 * Can be extended for: Other similar use cases that need
 * to detect extension presence for feature gating or UX optimization.
-->

<head>
    <meta charset="utf-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>

</html>
