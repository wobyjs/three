<style>
    .acrobat-toast {
        --toast-bg: #292929;
        --toast-close-hover-bg: #505050;
        --toast-min-width: 330px;
        --toast-action-btn-border: 2px solid #9aa0a6;
        --toast-action-btn-border-radius: 999px;
        --toast-action-btn-padding: 8px 16px;
        --toast-action-btn-bg: none;
        --toast-action-btn-color: #FFFFFF;
        --toast-action-btn-hover-bg: #505050;
        --toast-action-btn-hover-text-decoration: none;
        --toast-separator-display: none;
        --toast-separator-color: rgba(255, 255, 255, 0.3);
        --toast-separator-width: 1px;
        --toast-separator-margin-left: 15px;
        --toast-separator-margin-right: 5px;
        --toast-close-icon-color: #C6C6C6;
        --toast-close-icon-url: none;
        --toast-close-size: 22px;
        position: fixed;
        bottom: 24px;
        left: 30px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        min-width: var(--toast-min-width);
        min-height: 52px;
        padding: 5px 9px 5px 25px;
        background-color: var(--toast-bg);
        border-radius: 4px;
        box-shadow: 0 2px 8px 0 rgba(0, 0, 0, 0.08),
                    0 1px 4px 0 rgba(0, 0, 0, 0.04),
                    0 0 1px 0 rgba(0, 0, 0, 0.08);
        box-sizing: border-box;
        z-index: 1000000;
    }

    .acrobat-toast-message {
        min-height: 20px;
        font-family: "Google Sans", "Roboto", sans-serif;
        font-size: 14px;
        font-weight: 400;
        line-height: 140%;
        font-variant-numeric: lining-nums tabular-nums;
        color: #FFFFFF;
        margin-right: 20px;
    }

    .acrobat-toast-action-button {
        flex-shrink: 0;
        font-family: "Roboto", sans-serif;
        font-size: 14px;
        font-weight: 700;
        line-height: 100%;
        color: var(--toast-action-btn-color);
        background: var(--toast-action-btn-bg);
        border: var(--toast-action-btn-border);
        padding: var(--toast-action-btn-padding);
        border-radius: var(--toast-action-btn-border-radius);
        cursor: pointer;
        text-decoration: none;
        margin-right: var(--toast-separator-margin-right);
    }

    .acrobat-toast-action-button:hover {
        background: var(--toast-action-btn-hover-bg);
        text-decoration: var(--toast-action-btn-hover-text-decoration);
    }

    /* Text-link style for error toast CTA (e.g. Google Docs try again) */
    .acrobat-toast-action-button--link {
        border: none;
        border-radius: 0;
        padding: 0;
        background: none;
    }

    .acrobat-toast-action-button--link:hover {
        background: transparent;
        text-decoration: underline;
    }

    .acrobat-toast-separator {
        display: var(--toast-separator-display);
        width: var(--toast-separator-width);
        min-width: var(--toast-separator-width);
        align-self: stretch;
        min-height: 20px;
        background-color: var(--toast-separator-color);
        margin: 5px;
        margin-left: var(--toast-separator-margin-left);
        margin-right: var(--toast-separator-margin-right);
        flex-shrink: 0;
    }

    .acrobat-toast-close {
        display: flex;
        width: 42px;
        height: 42px;
        padding: 10px;
        gap: 10px;
        background: none;
        border: none;
        cursor: pointer;
    }

    .acrobat-toast-close-icon {
        width: var(--toast-close-size);
        height: var(--toast-close-size);
        display: block;
        background-color: var(--toast-close-icon-color);
        -webkit-mask: var(--toast-close-icon-url) no-repeat center;
        mask: var(--toast-close-icon-url) no-repeat center;
        -webkit-mask-size: contain;
        mask-size: contain;
    }

    .acrobat-toast-close:hover {
        background-color: var(--toast-close-hover-bg);
        border-radius: 100px;
    }
</style>

<div class="acrobat-toast">
    <div id="acrobat-toast-message" class="acrobat-toast-message"></div>
    <button id="acrobat-toast-action-button" class="acrobat-toast-action-button" style="display: none;"></button>
    <div id="acrobat-toast-separator" class="acrobat-toast-separator" aria-hidden="true"></div>
    <button id="acrobat-toast-close" class="acrobat-toast-close" aria-label="Close">
        <span class="acrobat-toast-close-icon" id="acrobat-toast-close-icon" role="img" aria-label="Close"></span>
    </button>
</div>
