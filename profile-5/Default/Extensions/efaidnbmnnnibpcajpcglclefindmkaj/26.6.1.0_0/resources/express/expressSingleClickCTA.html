    .cc440d50ba-tooltiptext {
      font-family: "Adobe Clean", adobe-clean, "AdobeClean-Bold", sans-serif !important;
      pointer-events: none;
      cursor: default;
      font-weight: 400;
      font-size: 12px;

      width: 200px;
      top: 119%;
      line-height: 15px;
      background-color: #292929;
      color: #fff;
      text-align: left;
      border-radius: 7px;
      padding: 4px 9px 5px 9px;

      z-index: 10000;
      box-sizing: border-box;
      -webkit-box-sizing: border-box;
      -moz-box-sizing: border-box;
    }

    .cc440d50ba-tooltiptext-bottom::after {
      content: "";
      position: absolute;
      bottom: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: transparent transparent #292929 transparent;
    }

    .cc440d50ba-tooltiptext-top::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: #292929 transparent transparent transparent;
    }

    .cc440d50ba-tooltiptext-left::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 100%;
      margin-top: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: transparent transparent transparent #292929;
    }

    .cc440d50ba-tooltiptext-right::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 100%;
      margin-top: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: transparent #292929 transparent transparent;
    }
